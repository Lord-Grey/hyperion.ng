<div class="container-fluid">
	<h3 class="page-header"><i class="fa fa-wrench fa-fw"></i><span data-i18n="conf_general_label_title">General</span>
	</h3>
	<div class="row">
		<div class="row gy-2" id="conf_cont"></div>
	</div>
	<div class="row">
		<!-- Instance(s) -->
		<div class="row gy-2">
			<div class="col-lg-6" id="inst_desc">
				<div class="card card-default">
					<div class="card-header card-instance">
						<span class="mdi mdi-lightbulb-group" style="margin-right:5px;"></span>
						<span data-i18n="conf_general_inst_title"></span>
					</div>
					<div class="card-body">
						<div id="inst_desc_cont"></div>
						<div id="itable"></div>
						<hr style="margin: 30px 0" </hr>
						<div class="row">
							<div class="col-lg-6">
								<p data-i18n="conf_general_inst_name_title" style="font-weight:bold"></p>
							</div>
							<div class="col-lg-6">
								<input class="form-control" id="inst_name" type="text"></input>
							</div>
							<div class="col-lg-6">
								<span id="inst_chars_needed"><br /></span>
							</div>
						</div>
					</div>
					<div class="card-footer" style="text-align: right;">
						<button class="btn btn-primary" id="btn_create_inst" data-i18n="conf_general_createInst_btn"
							disabled>Create New Instance</button>
					</div>
				</div>
			</div>
			<!-- Import/Export -->
			<div class="col" id="conf_imp">
				<div class="card card-default">
					<div class="card-header card-system">
						<i class="fa fa-wrench fa-fw"></i>
						<span data-i18n="conf_general_impexp_title"></span>
					</div>
					<div class="card-body">
						<div id="imp_desc_cont"></div>
						<input class="form-control" type="file" id="select_import_conf" accept=".json">
					</div>
					<div class="card-footer" style="text-align:right">
						<button type="file" class="btn btn-primary" id="btn_import_conf"
							data-i18n="conf_general_impexp_impbtn" disabled>Import
						</button>
						<button class="btn btn-primary" id="btn_export_conf"
							data-i18n="conf_general_impexp_expbtn">Export
						</button>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
</div>



<script src="/js/content_general.js"></script>
